# x402 Payment Gateway — Example Configuration
#
# Copy this file to x402.toml and customise for your operator deployment.
# The gateway converts wei-denominated job prices into stablecoin amounts
# using the exchange rates and markups defined here.

# Socket address for the x402 HTTP server.
bind_address = "0.0.0.0:8402"

# URL of the x402 facilitator used for payment verification and settlement.
facilitator_url = "https://x402.org/facilitator"

# How long (seconds) dynamically-generated quotes stay valid.
quote_ttl_secs = 300
default_invocation_mode = "disabled"

# Service instance ID (set at runtime by the operator).
service_id = 1

# ─── Job Invocation Policies ───────────────────────────────────────────────
#
# Jobs are denied by default unless explicitly enabled here.
# `restricted_paid` models on-chain permission checks via `eth_call`.
#
# Public paid job (payment-gated only)
[[job_policies]]
service_id = 1
job_index = 0
invocation_mode = "public_paid"

# Restricted paid job (payment + on-chain caller permission parity)
[[job_policies]]
service_id = 1
job_index = 1
invocation_mode = "restricted_paid"
auth_mode = "payer_is_caller"
tangle_rpc_url = "http://127.0.0.1:8545"
tangle_contract = "0x0000000000000000000000000000000000000001"

# ─── Accepted Tokens ──────────────────────────────────────────────────────
#
# Each [[accepted_tokens]] entry describes a token the operator will accept.
# Fields:
#   network             – CAIP-2 chain identifier (e.g. "eip155:8453" for Base)
#   asset               – Token contract address on that chain
#   symbol              – Human-readable symbol
#   decimals            – Token decimal places (6 for USDC, 18 for DAI, etc.)
#   pay_to              – Operator's receive address on this chain
#   rate_per_native_unit – Exchange rate: 1 native unit = N token units
#   markup_bps          – Markup in basis points (100 bps = 1%)

# USDC on Base
[[accepted_tokens]]
network = "eip155:8453"
asset   = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
symbol  = "USDC"
decimals = 6
pay_to  = "0xYourOperatorAddressOnBase"
rate_per_native_unit = "3200.00"
markup_bps = 200

# USDC on Ethereum mainnet
[[accepted_tokens]]
network = "eip155:1"
asset   = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
symbol  = "USDC"
decimals = 6
pay_to  = "0xYourOperatorAddressOnEthereum"
rate_per_native_unit = "3200.00"
markup_bps = 300

# ─── Optional: MPP (Machine Payments Protocol) ingress ────────────────────
#
# When this section is present, the gateway also exposes
#   POST /mpp/jobs/{service_id}/{job_index}
# alongside the existing /x402/jobs/... routes. The two ingresses share the
# same job pricing, accepted-token table, restricted-auth modes, and producer
# stream — clients can pick whichever wire format their wallet speaks.
#
# MPP is the IETF standards-track Payment HTTP Authentication Scheme
# (https://paymentauth.org). It uses standard `WWW-Authenticate: Payment` /
# `Authorization: Payment` / `Payment-Receipt` headers and RFC 9457 Problem
# Details errors. The Blueprint MPP method (`blueprintevm`) wraps the same
# EIP-3009 / Permit2 payloads x402 clients already produce, so existing
# x402 wallets work over the MPP wire format unchanged.
#
# Fields:
#   realm              – Realm string for the WWW-Authenticate challenge
#                        (typically your public hostname).
#   secret_key         – HMAC secret used to bind challenge IDs to their
#                        parameters. MUST be at least 32 bytes of entropy.
#                        Rotate on a schedule; rotation invalidates
#                        outstanding challenges (in-flight clients
#                        transparently retry on a fresh 402).
#   challenge_ttl_secs – How long a 402 challenge remains valid. Must be
#                        ≤ quote_ttl_secs above. Default 300.
#
# Comment out the entire section to disable the MPP ingress.
[mpp]
realm = "blueprint.example.com"
# REPLACE THIS VALUE before deploying. Generate with `openssl rand -hex 32`.
# The validator REJECTS the well-known example/demo secret_key values at
# startup; this constant is intentionally a placeholder that will fail
# X402Config::validate() so a copy-paste deployment cannot ship by accident.
secret_key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
challenge_ttl_secs = 300
