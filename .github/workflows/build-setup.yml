# This file is used to install the Foundry toolchain and verify the installation.

- name: Install Foundry
  uses: foundry-rs/foundry-toolchain@v1

- name: Verify Forge installation
  run: |
    forge --version
    echo "Forge version check completed"

- name: Install Solidity Dependencies
  run: |
    # Soldeer registry flakes frequently from GitHub Actions IPs —
    # retry with exponential backoff before failing the whole build.
    # No sleep after the final attempt so we exit as soon as we give up.
    attempts=5
    delay=10
    for attempt in $(seq 1 $attempts); do
      if forge soldeer update -d; then
        echo "Solidity dependencies installed on attempt $attempt"
        exit 0
      fi
      if [ "$attempt" -lt "$attempts" ]; then
        echo "soldeer attempt $attempt/$attempts failed; sleeping ${delay}s"
        sleep "$delay"
        delay=$((delay * 2))
      fi
    done
    echo "soldeer failed after $attempts attempts" >&2
    exit 1

- name: install protobuf and gmp (Linux)
  if: runner.os == 'Linux'
  run: |
    sudo apt-get update
    sudo apt-get install -y protobuf-compiler libprotobuf-dev libgmp-dev

- name: install protobuf and gmp (macOS)
  if: runner.os == 'macOS'
  run: |
    brew install protobuf gmp
    echo "Installed protobuf and gmp on macOS"

- name: Install LLVM and Clang
  uses: KyleMayes/install-llvm-action@v2
  with:
    version: "19.1.7"
