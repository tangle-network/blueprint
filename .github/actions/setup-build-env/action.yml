name: Setup Build Environment
description: Install Rust, LLVM, protobuf, GMP, Foundry, sccache, and configure caching

inputs:
  rust-toolchain:
    description: Rust toolchain to install
    default: stable
  cache:
    description: Enable Rust build cache
    default: "true"
  sccache:
    description: Enable sccache (shared compilation cache via GH Actions cache)
    default: "true"
  foundry:
    description: Install Foundry
    default: "true"
  nextest:
    description: Install cargo-nextest
    default: "false"
  tnt-core:
    description: Checkout and verify tnt-core
    default: "true"
  components:
    description: Additional Rust components (comma-separated)
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout tnt-core
      if: inputs.tnt-core == 'true'
      uses: actions/checkout@v4
      with:
        repository: tangle-network/tnt-core
        path: tnt-core

    - name: Verify tnt-core bindings
      if: inputs.tnt-core == 'true'
      shell: bash
      run: ./scripts/ci/verify-tnt-core.sh

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: ${{ inputs.components }}

    - name: Setup sccache
      if: inputs.sccache == 'true'
      uses: mozilla-actions/sccache-action@v0.0.7

    - name: Configure sccache
      if: inputs.sccache == 'true'
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        # Verify sccache can start before setting as wrapper
        if sccache --start-server 2>/dev/null && sccache --show-stats 2>/dev/null; then
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "sccache configured successfully"
        else
          echo "::warning::sccache failed to start, falling back to direct rustc"
          sccache --stop-server 2>/dev/null || true
        fi

    - name: Rust cache
      if: inputs.cache == 'true'
      uses: swatinem/rust-cache@v2
      with:
        cache-on-failure: "true"

    - name: Install system dependencies (protobuf, gmp, mold linker)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler libprotobuf-dev libgmp-dev mold

    - name: Install LLVM 19
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "19.1.7"

    - name: Install Foundry
      if: inputs.foundry == 'true'
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: stable
      continue-on-error: true

    - name: Retry Foundry if needed
      if: inputs.foundry == 'true'
      shell: bash
      run: |
        if ! command -v forge &> /dev/null; then
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup --version stable
        fi
        forge --version

    - name: Install nextest
      if: inputs.nextest == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: nextest

    - name: Show sccache stats
      if: inputs.sccache == 'true' && always()
      shell: bash
      run: sccache --show-stats 2>/dev/null || true
